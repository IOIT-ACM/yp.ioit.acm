name: Deploy Vite to yp.ioit.acm.org

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Vite app
        run: bun run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH stream
        run: |
          tar -czf - dist | \
          ssh -p ${{ secrets.SSH_PORT }} \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
            LIVE_PATH="$HOME/yp.ioit.acm.org"
            TMP_PATH="$HOME/yp_app"

            rm -rf "$TMP_PATH"
            mkdir -p "$TMP_PATH"

            tar -xzf - -C "$TMP_PATH"

            rm -rf "$LIVE_PATH"/*
            mv "$TMP_PATH"/dist/* "$LIVE_PATH"/

            rm -rf "$TMP_PATH"
          '
